<!DOCTYPE html>
<html>
<head>
<title>Khozamy</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background: linear-gradient(135deg,#ff6a00,#ee0979);
    color:white;

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

/* Container */
.container{
    animation: fadeIn 1.2s ease-in-out;
}

/* Animation */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    font-size:60px;
    margin:0 0 10px 0;
    letter-spacing:4px;
    text-transform:uppercase;
    text-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

p{
    font-size:18px;
    margin-bottom:20px;
}

/* Base Button */
.btn{
    display:inline-block;
    margin:8px;
    background: linear-gradient(45deg,#ffffff,#e0e0e0);
    color:#ee0979;
    padding:12px 28px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
    font-size:16px;
    transition:0.3s;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.btn:hover{
    transform:scale(1.05);
}

/* Facebook button */
.btn.facebook{
    background: linear-gradient(45deg,#1877f2,#0d5bd7);
    color:white;
}

/* Mobile */
@media (max-width:600px){
    h1{
        font-size:40px;
    }

    p{
        font-size:16px;
    }
}
</style>

</head>

<body>

<div class="container">
    <h1>khozamy</h1>
    <p>Draw anything now !</p>

    <a class="btn" href="https://instagram.com/khozamy_art" target="_blank">
        📷 Instagram
    </a>

    <a class="btn facebook" href="https://www.facebook.com/share/1XsWQcefaG/" target="_blank">
        📘 Facebook
    </a>
</div>

</body>
</html>
